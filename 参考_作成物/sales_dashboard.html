<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>売上データ ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        header h1 { font-size: 1.5rem; font-weight: 600; }
        header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ファイルピッカー */
        #file-picker {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        #drop-zone {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        #drop-zone:hover, #drop-zone.dragover {
            background: #f0f0ff;
            border-color: #764ba2;
        }
        #drop-zone .icon { font-size: 3rem; margin-bottom: 10px; }
        #drop-zone p { color: #666; margin: 8px 0; }
        #drop-zone .main-text { font-size: 1.1rem; font-weight: 600; color: #333; }
        #file-input { display: none; }
        .file-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s;
        }
        .file-btn:hover { transform: scale(1.05); }

        /* ダッシュボード（初期非表示） */
        #dashboard { display: none; }

        /* フィルタバー */
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .filter-bar label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
        }
        .filter-bar select, .filter-bar input[type="date"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            background: white;
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .reset-btn {
            padding: 8px 20px;
            background: #e0e0e0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: auto;
        }
        .reset-btn:hover { background: #d0d0d0; }

        /* サマリーカード */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .card .label { font-size: 0.85rem; color: #888; margin-bottom: 6px; }
        .card .value { font-size: 1.6rem; font-weight: 700; color: #333; }
        .card .unit { font-size: 0.9rem; color: #888; }

        /* グラフエリア */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .chart-box h3 { font-size: 1rem; color: #555; margin-bottom: 12px; }

        /* データテーブル */
        .table-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow-x: auto;
        }
        .table-section h3 { font-size: 1rem; color: #555; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th {
            background: #f8f9fa;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #dee2e6;
            white-space: nowrap;
        }
        td {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }
        tr:hover { background: #f8f9fa; }
        .text-right { text-align: right; }
        .show-all-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .charts-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.2rem; }
            .container { padding: 12px; }
        }
    </style>
</head>
<body>

<header>
    <h1>売上データ ダッシュボード</h1>
    <p>CSVファイルを読み込んで、売上データをリアルタイムに集計・可視化</p>
</header>

<div class="container">
    <!-- ファイルピッカー -->
    <div id="file-picker">
        <div id="drop-zone">
            <div class="icon">📊</div>
            <p class="main-text">CSVファイルをドラッグ&ドロップ</p>
            <p>または</p>
            <button class="file-btn" onclick="document.getElementById('file-input').click()">CSVファイルを選択</button>
            <input type="file" id="file-input" accept=".csv">
            <p style="margin-top:16px; font-size:0.8rem; color:#999;">sales_data.csv を選んでください</p>
        </div>
    </div>

    <!-- ダッシュボード本体 -->
    <div id="dashboard">
        <!-- フィルタバー -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>カテゴリ</label>
                <select id="filter-category"><option value="">全て</option></select>
            </div>
            <div class="filter-group">
                <label>地域</label>
                <select id="filter-region"><option value="">全て</option></select>
            </div>
            <div class="filter-group">
                <label>担当者</label>
                <select id="filter-person"><option value="">全て</option></select>
            </div>
            <div class="filter-group">
                <label>開始日</label>
                <input type="date" id="filter-date-start">
            </div>
            <div class="filter-group">
                <label>終了日</label>
                <input type="date" id="filter-date-end">
            </div>
            <button class="reset-btn" onclick="resetFilters()">リセット</button>
        </div>

        <!-- サマリーカード -->
        <div class="summary-cards">
            <div class="card">
                <div class="label">総売上金額</div>
                <div class="value" id="total-sales">-</div>
                <div class="unit">円</div>
            </div>
            <div class="card">
                <div class="label">取引件数</div>
                <div class="value" id="total-count">-</div>
                <div class="unit">件</div>
            </div>
            <div class="card">
                <div class="label">平均単価</div>
                <div class="value" id="avg-price">-</div>
                <div class="unit">円</div>
            </div>
            <div class="card">
                <div class="label">商品種類数</div>
                <div class="value" id="product-types">-</div>
                <div class="unit">種類</div>
            </div>
        </div>

        <!-- グラフ -->
        <div class="charts-grid">
            <div class="chart-box">
                <h3>月別売上推移</h3>
                <canvas id="chart-monthly"></canvas>
            </div>
            <div class="chart-box">
                <h3>カテゴリ別構成</h3>
                <canvas id="chart-category"></canvas>
            </div>
            <div class="chart-box">
                <h3>担当者別売上</h3>
                <canvas id="chart-person"></canvas>
            </div>
            <div class="chart-box">
                <h3>地域別売上</h3>
                <canvas id="chart-region"></canvas>
            </div>
        </div>

        <!-- データテーブル -->
        <div class="table-section">
            <h3>データ一覧 (<span id="table-count">0</span>件)</h3>
            <table>
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>商品名</th>
                        <th>カテゴリ</th>
                        <th class="text-right">数量</th>
                        <th class="text-right">単価</th>
                        <th class="text-right">金額</th>
                        <th>担当者</th>
                        <th>地域</th>
                    </tr>
                </thead>
                <tbody id="data-table-body"></tbody>
            </table>
            <button class="show-all-btn" id="show-all-btn" style="display:none" onclick="showAllRows()">全件表示</button>
        </div>
    </div>
</div>

<script>
// --- グローバル変数 ---
let allData = [];
let filteredData = [];
let charts = {};
let showAll = false;
const DISPLAY_LIMIT = 50;

const COLORS = {
    '家電': '#4e79a7',
    '文房具': '#f28e2b',
    '食品': '#59a14f',
    '日用品': '#e15759',
};
const REGION_COLORS = ['#4e79a7', '#f28e2b', '#59a14f', '#e15759', '#76b7b2'];
const PERSON_COLORS = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b'];

// --- CSV読み込み ---
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');

fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) parseFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) parseFile(e.dataTransfer.files[0]);
});

function parseFile(file) {
    Papa.parse(file, {
        header: true,
        encoding: 'UTF-8',
        skipEmptyLines: true,
        complete: (results) => {
            allData = results.data.map(row => ({
                ...row,
                数量: parseInt(row['数量']) || 0,
                単価: parseInt(row['単価']) || 0,
                金額: parseInt(row['金額']) || 0,
            }));
            document.getElementById('file-picker').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            populateFilters();
            applyFilters();
        }
    });
}

// --- フィルタ ---
function populateFilters() {
    const fill = (id, key) => {
        const sel = document.getElementById(id);
        const vals = [...new Set(allData.map(r => r[key]))].sort();
        sel.innerHTML = '<option value="">全て</option>' + vals.map(v => `<option value="${v}">${v}</option>`).join('');
    };
    fill('filter-category', 'カテゴリ');
    fill('filter-region', '地域');
    fill('filter-person', '担当者');

    const dates = allData.map(r => r['日付'].replace(/\//g, '-'));
    document.getElementById('filter-date-start').value = dates.sort()[0] || '';
    document.getElementById('filter-date-end').value = dates.sort().pop() || '';
}

['filter-category', 'filter-region', 'filter-person', 'filter-date-start', 'filter-date-end'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => applyFilters());
});

function resetFilters() {
    document.getElementById('filter-category').value = '';
    document.getElementById('filter-region').value = '';
    document.getElementById('filter-person').value = '';
    const dates = allData.map(r => r['日付'].replace(/\//g, '-')).sort();
    document.getElementById('filter-date-start').value = dates[0] || '';
    document.getElementById('filter-date-end').value = dates[dates.length - 1] || '';
    showAll = false;
    applyFilters();
}

function applyFilters() {
    const cat = document.getElementById('filter-category').value;
    const reg = document.getElementById('filter-region').value;
    const per = document.getElementById('filter-person').value;
    const ds = document.getElementById('filter-date-start').value;
    const de = document.getElementById('filter-date-end').value;

    filteredData = allData.filter(r => {
        if (cat && r['カテゴリ'] !== cat) return false;
        if (reg && r['地域'] !== reg) return false;
        if (per && r['担当者'] !== per) return false;
        const d = r['日付'].replace(/\//g, '-');
        if (ds && d < ds) return false;
        if (de && d > de) return false;
        return true;
    });

    updateSummary();
    renderCharts();
    renderTable();
}

// --- サマリーカード ---
function updateSummary() {
    const total = filteredData.reduce((s, r) => s + r['金額'], 0);
    const count = filteredData.length;
    const avg = count ? Math.round(total / count) : 0;
    const types = new Set(filteredData.map(r => r['商品名'])).size;

    document.getElementById('total-sales').textContent = total.toLocaleString('ja-JP');
    document.getElementById('total-count').textContent = count.toLocaleString('ja-JP');
    document.getElementById('avg-price').textContent = avg.toLocaleString('ja-JP');
    document.getElementById('product-types').textContent = types;
}

// --- グラフ ---
function renderCharts() {
    Object.values(charts).forEach(c => c.destroy());
    charts = {};

    // 月別売上推移
    const monthly = {};
    filteredData.forEach(r => {
        const m = r['日付'].substring(0, 7);
        monthly[m] = (monthly[m] || 0) + r['金額'];
    });
    const mLabels = Object.keys(monthly).sort();
    charts.monthly = new Chart(document.getElementById('chart-monthly'), {
        type: 'bar',
        data: {
            labels: mLabels.map(l => l.replace('-', '/')),
            datasets: [{
                label: '売上金額',
                data: mLabels.map(l => monthly[l]),
                backgroundColor: '#667eea',
                borderRadius: 6,
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: ctx => ctx.raw.toLocaleString('ja-JP') + '円' } }
            },
            scales: { y: { ticks: { callback: v => (v / 10000).toFixed(0) + '万' } } }
        }
    });

    // カテゴリ別構成
    const catData = {};
    filteredData.forEach(r => { catData[r['カテゴリ']] = (catData[r['カテゴリ']] || 0) + r['金額']; });
    const catLabels = Object.keys(catData);
    charts.category = new Chart(document.getElementById('chart-category'), {
        type: 'doughnut',
        data: {
            labels: catLabels,
            datasets: [{
                data: catLabels.map(l => catData[l]),
                backgroundColor: catLabels.map(l => COLORS[l] || '#999'),
            }]
        },
        options: {
            responsive: true,
            plugins: {
                tooltip: { callbacks: { label: ctx => ctx.label + ': ' + ctx.raw.toLocaleString('ja-JP') + '円' } }
            }
        }
    });

    // 担当者別売上
    const personData = {};
    filteredData.forEach(r => { personData[r['担当者']] = (personData[r['担当者']] || 0) + r['金額']; });
    const personEntries = Object.entries(personData).sort((a, b) => b[1] - a[1]);
    charts.person = new Chart(document.getElementById('chart-person'), {
        type: 'bar',
        data: {
            labels: personEntries.map(e => e[0]),
            datasets: [{
                label: '売上金額',
                data: personEntries.map(e => e[1]),
                backgroundColor: PERSON_COLORS,
                borderRadius: 6,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: ctx => ctx.raw.toLocaleString('ja-JP') + '円' } }
            },
            scales: { x: { ticks: { callback: v => (v / 10000).toFixed(0) + '万' } } }
        }
    });

    // 地域別売上
    const regionData = {};
    filteredData.forEach(r => { regionData[r['地域']] = (regionData[r['地域']] || 0) + r['金額']; });
    const regionEntries = Object.entries(regionData).sort((a, b) => b[1] - a[1]);
    charts.region = new Chart(document.getElementById('chart-region'), {
        type: 'bar',
        data: {
            labels: regionEntries.map(e => e[0]),
            datasets: [{
                label: '売上金額',
                data: regionEntries.map(e => e[1]),
                backgroundColor: REGION_COLORS,
                borderRadius: 6,
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: ctx => ctx.raw.toLocaleString('ja-JP') + '円' } }
            },
            scales: { y: { ticks: { callback: v => (v / 10000).toFixed(0) + '万' } } }
        }
    });
}

// --- データテーブル ---
function renderTable() {
    const rows = showAll ? filteredData : filteredData.slice(0, DISPLAY_LIMIT);
    document.getElementById('table-count').textContent = filteredData.length;
    document.getElementById('data-table-body').innerHTML = rows.map(r => `
        <tr>
            <td>${r['日付']}</td>
            <td>${r['商品名']}</td>
            <td>${r['カテゴリ']}</td>
            <td class="text-right">${r['数量']}</td>
            <td class="text-right">${r['単価'].toLocaleString('ja-JP')}</td>
            <td class="text-right">${r['金額'].toLocaleString('ja-JP')}</td>
            <td>${r['担当者']}</td>
            <td>${r['地域']}</td>
        </tr>
    `).join('');

    const btn = document.getElementById('show-all-btn');
    btn.style.display = (!showAll && filteredData.length > DISPLAY_LIMIT) ? 'inline-block' : 'none';
    btn.textContent = `全${filteredData.length}件を表示`;
}

function showAllRows() {
    showAll = true;
    renderTable();
}
</script>

</body>
</html>
